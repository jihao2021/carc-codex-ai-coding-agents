# CARC Codex managed-style settings.
#
# Codex does not currently have Claude Code's root-only
# /etc/claude-code/managed-settings.json boundary. For Codex, this file is the
# auditable root-tier policy source; INSTALL.md copies it to
# /etc/codex-carc/config.toml, and bin/carc-codex also passes the same critical
# settings on the command line.

sandbox_mode = "workspace-write"
approval_policy = "untrusted"

[features]
hooks = true

[hooks]
PreToolUse = [
  { matcher = "exec_command", command = "/etc/codex-carc/hooks/precheck.sh", timeout = 10 },
  { matcher = "apply_patch", command = "/etc/codex-carc/hooks/precheck.sh", timeout = 10 },
]
